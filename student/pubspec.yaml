name: student
description: "Print Scheduling Application for Students"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # PDF Operations
  syncfusion_flutter_pdf: ^24.2.9
  pdf: ^3.11.1
  printing: ^5.13.1

  # File Operations
  file_picker: ^8.0.7
  path_provider: ^2.1.4
  path: ^1.9.0
  permission_handler: ^11.3.1

  # Image Operations
  image_picker: ^1.1.2
  image: ^4.2.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Network
  dio: ^5.5.0+1
  connectivity_plus: ^6.0.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # OCR REMOVED - Screenshots sent directly to Xerox Manager for manual verification
  # (This reduced APK size by ~100MB)

  # UPI & Payment
  url_launcher: ^6.3.0
  open_filex: ^4.5.0

  # UUID Generation
  uuid: ^4.4.2

  # Utilities
  intl: ^0.19.0
  share_plus: ^12.0.1

  # Firebase (Push Notifications)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
